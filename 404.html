<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0524" />
  <title>Página não encontrada · BookVerse</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/png" href="img/logo.png">
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="stylesheet" href="css/style.css?v=2" />
  <style>
    .pagina-404 {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      gap: 10px;
    }
    .pagina-404 h1 { font-size: clamp(1.6rem, 5vw, 2.4rem); }
    .pagina-404 p { color: var(--texto-suave, #b9b3d6); max-width: 40ch; }
    .pagina-404 .botao-loja { margin-top: 14px; }
  </style>
</head>
<body>
  <main class="pagina-404">
    <img src="img/logo.png" alt="" width="72" height="72" style="border-radius:16px" onerror="this.style.display='none'">
    <h1>Essa página não existe</h1>
    <p>O endereço pode ter mudado ou o link veio errado. A estante continua no lugar de sempre.</p>
    <a class="botao-loja botao-loja-primario" href="./">Voltar para a loja</a>
  </main>
</body>
</html>
