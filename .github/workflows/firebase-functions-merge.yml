# Publica o BACKEND (Firebase Functions) sozinho quando a main muda.
# Complementa o deploy do site (firebase-hosting-merge.yml), que só cuida
# das páginas. Assim, mexer em functions/ não exige mais rodar
# "firebase deploy --only functions" à mão.
name: Deploy Functions to Firebase on merge

on:
  push:
    branches:
      - main
    # Só roda quando o backend (ou este workflow) muda — evita redeploy
    # desnecessário das funções a cada ajuste de página.
    paths:
      - "functions/**"
      - "firebase.json"
      - ".github/workflows/firebase-functions-merge.yml"
  # Disparo manual: aba Actions → este workflow → "Run workflow".
  # Útil para tentar o deploy de novo sem precisar de um novo commit
  # (ex.: depois de corrigir uma permissão no Google Cloud).
  workflow_dispatch:

jobs:
  deploy_functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Autentica no Google usando a MESMA conta de serviço que o deploy
      # do site já usa (segredo FIREBASE_SERVICE_ACCOUNT_BOOKVERSE_69878).
      - name: Autenticar no Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_BOOKVERSE_69878 }}"

      # O firebase-tools carrega o código das functions para descobrir o
      # que publicar — sem as dependências instaladas, o deploy falha com
      # "Couldn't find firebase-functions package in your source code".
      - name: Instalar dependências das Functions
        working-directory: functions
        run: npm ci

      - name: Publicar as Cloud Functions
        run: npx --yes firebase-tools deploy --only functions --project bookverse-69878 --non-interactive --force
